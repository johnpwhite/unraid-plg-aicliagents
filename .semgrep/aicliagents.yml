# Semgrep ruleset for unraid-aicliagents (WP #150)
#
# Philosophy: ERROR-severity rules are unambiguously dangerous patterns that
# should never appear in this plugin source. WARNING-severity rules are
# defence-in-depth nudges that may have legitimate exceptions — they log
# but do not block the publish gate.
#
# Start small and tight. Add rules as patterns surface in real diffs.

rules:
  # ERROR severity — block publish
  - id: aicli-eval-on-user-input
    pattern-either:
      - pattern: "eval($_GET[...])"
      - pattern: "eval($_POST[...])"
      - pattern: "eval($_REQUEST[...])"
      - pattern: "eval($_COOKIE[...])"
    message: |
      eval() on user-controlled input is RCE-by-design. Never legitimate in this
      plugin. Refactor to dispatch on a known-good keyword set.
    severity: ERROR
    languages: [php]

  - id: aicli-system-passthru-on-user-input
    pattern-either:
      - pattern: "system($_GET[...])"
      - pattern: "system($_POST[...])"
      - pattern: "system($_REQUEST[...])"
      - pattern: "passthru($_GET[...])"
      - pattern: "passthru($_POST[...])"
      - pattern: "passthru($_REQUEST[...])"
    message: |
      Passing raw user input to system()/passthru() is command injection. Use
      proc_open() with an argv array (no shell), or validate against a known-good
      set first. See SshKeyService for the preferred pattern.
    severity: ERROR
    languages: [php]

  # WARNING severity — advisory only
  - id: aicli-echo-user-input-no-escape
    pattern-either:
      - pattern: "echo $_GET[...];"
      - pattern: "echo $_POST[...];"
      - pattern: "echo $_REQUEST[...];"
    message: |
      Echoing raw user input is XSS unless the output context is plain text.
      Wrap with htmlspecialchars($value, ENT_QUOTES, "UTF-8") for HTML contexts.
    severity: WARNING
    languages: [php]
